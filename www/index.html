<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pop the Bubbles!</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4d96ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      cursor: none;
      user-select: none;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    #score-panel {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .score-badge {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 6px 16px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 1px;
    }

    .score-badge span {
      font-size: 1.2rem;
      color: #ffd700;
    }

    #game-area {
      position: fixed;
      inset: 0;
    }

    /* ── Bubbles ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      animation: float linear forwards;
      transition: transform 0.08s ease;
      box-shadow: inset -6px -6px 20px rgba(0,0,0,0.2),
                  inset 6px 6px 20px rgba(255,255,255,0.4),
                  0 8px 30px rgba(0,0,0,0.3);
    }

    .bubble:hover { transform: scale(1.12); }

    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0;   }
      5%   { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-160px) rotate(360deg); opacity: 0; }
    }

    /* ── Pop burst ── */
    .pop-burst {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: burst 0.5s ease-out forwards;
      transform: translate(-50%, -50%);
    }

    @keyframes burst {
      0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(3.5); opacity: 0; }
    }

    /* ── Particle dots ── */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particle-fly 0.6s ease-out forwards;
    }

    @keyframes particle-fly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ── Score pop ── */
    .score-pop {
      position: absolute;
      pointer-events: none;
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      animation: score-rise 0.9s ease-out forwards;
      transform: translate(-50%, -50%);
      z-index: 200;
    }

    @keyframes score-rise {
      0%   { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
      60%  { transform: translate(-50%,-180%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%,-250%) scale(1);   opacity: 0; }
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      transition: transform 0.05s ease;
      font-size: 1rem;
      line-height: 1;
    }

    /* ── Start screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 400;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    #start-screen .game-title {
      font-size: clamp(1.6rem, 6vw, 3rem);
      color: white;
      font-weight: bold;
      text-shadow: 0 4px 20px rgba(77,150,255,0.8);
      animation: bounce 0.7s ease infinite alternate;
      text-align: center;
    }

    #start-screen .bubbles-preview {
      font-size: clamp(2rem, 8vw, 4.5rem);
      animation: bounce 1s ease infinite alternate;
      animation-delay: 0.2s;
    }

    #start-btn {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      padding: 18px 60px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #4d96ff, #cc5de8);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(77,150,255,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      animation: pulse-btn 1.5s ease infinite alternate;
    }

    #start-btn:hover, #start-btn:active { transform: scale(1.08); }

    @keyframes pulse-btn {
      from { box-shadow: 0 8px 30px rgba(77,150,255,0.4); }
      to   { box-shadow: 0 8px 50px rgba(204,93,232,0.7); }
    }

    /* ── Pause button ── */
    #pause-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 300;
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.2s;
    }

    #pause-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
    #pause-btn.visible { display: flex; }

    /* ── Pause overlay ── */
    #pause-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 350;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    #pause-screen.show { display: flex; }

    #pause-screen .pause-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: white;
      font-weight: bold;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    #pause-screen button {
      font-size: 1rem;
      padding: 14px 50px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #4d96ff, #cc5de8);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }

    #pause-screen button:hover { transform: scale(1.05); }

    /* ── Celebration overlay ── */
    #celebration {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #celebration.show { display: flex; }

    #celebration .msg {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: white;
      font-weight: bold;
      text-shadow: 0 4px 20px rgba(255,215,0,0.8);
      animation: bounce 0.6s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #celebration button {
      font-size: 1rem;
      padding: 16px 48px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }

    #celebration button:hover { transform: scale(1.05); }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 600;
      width: 12px;
      height: 12px;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.6; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="cursor">🐥</div>

<!-- Start Screen -->
<div id="start-screen">
  <div class="game-title">🫧 Pop the Bubbles! 🫧</div>
  <div class="bubbles-preview">🌟🎈🦋</div>
  <button id="start-btn" onclick="startGame()">▶ Start Playing!</button>
</div>

<!-- Pause Button -->
<button id="pause-btn" onclick="togglePause()">⏸</button>

<!-- Pause Screen -->
<div id="pause-screen">
  <div class="pause-title">⏸ Paused</div>
  <button onclick="togglePause()">▶ Resume</button>
</div>

<div id="score-panel">
  <div class="score-badge">⭐ <span id="score">0</span></div>
  <div class="score-badge">🎯 Goal: <span id="goal">10</span></div>
</div>

<div id="game-area"></div>

<div id="celebration">
  <div class="msg">🎉 Amazing! 🎉</div>
  <div class="msg" style="font-size: clamp(1rem,3vw,1.6rem); animation-delay:0.1s">You're a Star! ⭐</div>
  <button onclick="nextLevel()">Play More! 🚀</button>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let score = 0;
let level = 1;
let goal  = 10;
let activeBubbles = 0;
let spawnTimer;
let celebrating = false;

const EMOJIS   = ['🌟','🌈','🦋','🐬','🦄','🐸','🐥','🎈','🍭','🌺','🦁','🐙','🌙','☀️','🍦'];
const COLORS   = [
  ['#ff6b6b','#ff8e8e'],['#ffd93d','#ffe066'],['#6bcb77','#8ee89b'],
  ['#4d96ff','#74aeff'],['#ff922b','#ffb347'],['#cc5de8','#e07af5'],
  ['#f06595','#f48fb1'],['#20c997','#63e6be'],
];

// ── Stars ──────────────────────────────────────────────────────────────
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${Math.random()*3+2}s;
      animation-delay:${Math.random()*3}s;
    `;
    container.appendChild(s);
  }
})();

// ── Custom cursor ──────────────────────────────────────────────────────
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => { cursorEl.style.transform = 'translate(-50%,-50%) scale(0.8)'; });
document.addEventListener('mouseup',   () => { cursorEl.style.transform = 'translate(-50%,-50%) scale(1)';   });

// ── Bubble creation ────────────────────────────────────────────────────
function spawnBubble() {
  if (celebrating) return;

  const area    = document.getElementById('game-area');
  const [c1,c2] = COLORS[Math.floor(Math.random() * COLORS.length)];
  const emoji   = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  const size    = Math.random() * 70 + 80;          // 80–150 px
  const speed   = Math.random() * 8 + 7;            // 7–15 s
  const left    = Math.random() * (window.innerWidth - size);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.cssText = `
    width:${size}px; height:${size}px;
    left:${left}px; bottom:-${size}px;
    background: radial-gradient(circle at 35% 35%, ${c2}, ${c1});
    animation-duration:${speed}s;
    font-size:${size * 0.42}px;
  `;
  bubble.textContent = emoji;
  activeBubbles++;

  // Pop on click OR touch
  const pop = (e) => {
    e.stopPropagation();
    if (!bubble.parentNode || paused) return;
    const rect = bubble.getBoundingClientRect();
    const cx   = rect.left + rect.width  / 2;
    const cy   = rect.top  + rect.height / 2;
    popBubble(bubble, cx, cy, c1, c2);
  };
  bubble.addEventListener('mousedown', pop);
  bubble.addEventListener('touchstart', pop, { passive: false });

  // Remove when animation ends (missed)
  bubble.addEventListener('animationend', () => {
    bubble.remove();
    activeBubbles--;
  });

  area.appendChild(bubble);
}

function popBubble(bubble, cx, cy, c1, c2) {
  bubble.remove();
  activeBubbles--;

  // Burst ring
  const burst = document.createElement('div');
  burst.className = 'pop-burst';
  burst.style.cssText = `
    left:${cx}px; top:${cy}px;
    width:80px; height:80px;
    background:${c1}; opacity:0.7;
  `;
  document.body.appendChild(burst);
  burst.addEventListener('animationend', () => burst.remove());

  // Particles
  for (let i = 0; i < 12; i++) {
    const p  = document.createElement('div');
    const angle = (i / 12) * 2 * Math.PI;
    const dist  = 60 + Math.random() * 60;
    p.className = 'particle';
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${8 + Math.random()*8}px;
      height:${8 + Math.random()*8}px;
      background:${Math.random()>0.5? c1 : c2};
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }

  // Score pop
  score++;
  document.getElementById('score').textContent = score;
  const sp = document.createElement('div');
  sp.className = 'score-pop';
  sp.style.cssText = `left:${cx}px; top:${cy}px;`;
  sp.textContent = '+1 ⭐';
  document.body.appendChild(sp);
  sp.addEventListener('animationend', () => sp.remove());

  // Level complete?
  if (score >= goal && !celebrating) celebrate();
}

// ── Spawner ────────────────────────────────────────────────────────────
function startSpawning() {
  const interval = Math.max(600, 1200 - level * 80);
  spawnBubble();
  spawnTimer = setTimeout(startSpawning, interval);
}

// ── Celebration ────────────────────────────────────────────────────────
function celebrate() {
  celebrating = true;
  clearTimeout(spawnTimer);
  document.getElementById('celebration').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const confettiColors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595'];
  for (let i = 0; i < 120; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const col = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      const isCircle = Math.random() > 0.5;
      c.style.cssText = `
        left:${Math.random()*100}vw;
        background:${col};
        border-radius:${isCircle ? '50%' : '2px'};
        animation-duration:${Math.random()*2+2}s;
        animation-delay:${Math.random()*1}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }, i * 25);
  }
}

function nextLevel() {
  level++;
  goal = 10 + (level - 1) * 5;
  score = 0;
  celebrating = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('goal').textContent  = goal;
  document.getElementById('celebration').classList.remove('show');
  startSpawning();
}

// ── Pause ──────────────────────────────────────────────────────────────
let paused = false;
let pausedBubbles = [];

function togglePause() {
  paused = !paused;
  const pauseScreen = document.getElementById('pause-screen');
  const pauseBtn    = document.getElementById('pause-btn');

  if (paused) {
    clearTimeout(spawnTimer);
    pauseScreen.classList.add('show');
    pauseBtn.textContent = '▶';
    // Pause all bubble animations
    document.querySelectorAll('.bubble').forEach(b => {
      b.style.animationPlayState = 'paused';
    });
  } else {
    pauseScreen.classList.remove('show');
    pauseBtn.textContent = '⏸';
    // Resume all bubble animations
    document.querySelectorAll('.bubble').forEach(b => {
      b.style.animationPlayState = 'running';
    });
    startSpawning();
  }
}

// ── Start Game ─────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('pause-btn').classList.add('visible');
  document.getElementById('goal').textContent = goal;
  startSpawning();
}

// ── Touch feedback ─────────────────────────────────────────────────────
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
